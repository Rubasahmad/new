<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Expresser – Cyber Threat Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

:root {
    --bg: #080d14;
    --surface: #0d1520;
    --border: #1a2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --text: #c8d8e8;
    --dim: #4a6075;
    --high: #ff3c3c;
    --medium: #ffaa00;
    --low: #39ff14;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Scanline overlay */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
}

.container {
    max-width: 1140px;
    margin: auto;
    padding: 24px 20px;
}

/* HEADER */
header {
    text-align: center;
    padding: 32px 0 28px;
    position: relative;
}

header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin-top: 24px;
}

.logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.2rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(0,212,255,0.6);
}

.tagline {
    font-size: 0.85rem;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
}

/* SEARCH BAR */
.search-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 28px;
}

.ip-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    width: 280px;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
}

.ip-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.25);
}

.ip-input::placeholder { color: var(--dim); }

.btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    padding: 12px 22px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
}

.btn-primary {
    background: var(--accent);
    color: var(--bg);
}

.btn-primary:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(0,212,255,0.5);
}

.btn-ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
}

.btn-ghost:hover {
    background: rgba(0,212,255,0.08);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 24px;
}

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 22px;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
}

.card-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 16px;
}

/* MAP */
#map {
    height: 280px;
    border-radius: 4px;
    border: 1px solid var(--border);
    filter: hue-rotate(180deg) invert(1) brightness(0.85);
}

/* LOADER */
.loader {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
}

.spinner {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

/* RESULT PANEL */
.ip-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(0,212,255,0.4);
    margin-bottom: 4px;
}

.location-line {
    font-size: 0.85rem;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
}

.info-item {
    background: rgba(0,212,255,0.04);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
}

.info-key {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
}

.info-val {
    font-size: 0.95rem;
    color: var(--text);
    font-weight: 600;
    margin-top: 2px;
    word-break: break-word;
}

/* RISK SCORE */
.risk-section {
    margin-top: 16px;
}

.risk-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
}

.risk-score-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
}

.risk-label {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    margin-left: 10px;
}

.risk-bar-bg {
    height: 8px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
}

.risk-bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.risk-factors {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.factor-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: 1px;
}

.factor-tag.active {
    border-color: var(--high);
    color: var(--high);
    background: rgba(255,60,60,0.08);
}

.factor-tag.inactive {
    border-color: var(--border);
    color: var(--dim);
}

/* CHART */
#riskChart {
    height: 240px !important;
    width: 100% !important;
}

/* DEVICE */
.device-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

/* HISTORY */
.history-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
}

.history-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 14px;
    background: rgba(0,212,255,0.06);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    color: var(--dim);
    transition: all 0.2s;
    letter-spacing: 1px;
}

.history-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.empty-state {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--dim);
    padding: 8px 0;
}

/* ALERT */
.alert {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 14px 16px;
    border-radius: 4px;
    border: 1px solid var(--high);
    color: var(--high);
    background: rgba(255,60,60,0.07);
    margin-top: 10px;
}

@media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .device-list { grid-template-columns: 1fr; }
    .ip-input { width: 100%; }
}
</style>
</head>

<body>
<div class="container">

    <header>
        <div class="logo">🛡 IP EXPRESSER</div>
        <div class="tagline">Cyber Threat Intelligence Dashboard</div>

        <div class="search-bar">
            <button class="btn btn-ghost" onclick="getMyIP()">📍 My IP</button>
            <input class="ip-input" id="ipInput" placeholder="Enter IP address…" onkeydown="if(event.key==='Enter') checkIP()">
            <button class="btn btn-primary" onclick="checkIP()">Analyze</button>
        </div>
    </header>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <span>Scanning target…</span>
    </div>

    <div class="grid" id="mainGrid">

        <!-- RESULT -->
        <div class="card" id="resultCard">
            <div class="card-title">// IP Intelligence</div>
            <div id="result">
                <div class="empty-state">Enter an IP to begin analysis.</div>
            </div>
        </div>

        <!-- MAP -->
        <div class="card">
            <div class="card-title">// Geolocation</div>
            <div id="map"></div>
        </div>

        <!-- CHART -->
        <div class="card">
            <div class="card-title">// Threat Indicators</div>
            <canvas id="riskChart"></canvas>
        </div>

        <!-- DEVICE + HISTORY -->
        <div class="card">
            <div class="card-title">// Device Info</div>
            <div id="deviceInfo" class="device-list">
                <div class="empty-state">No data yet.</div>
            </div>

            <div class="card-title" style="margin-top:22px;">// Recent Searches</div>
            <div id="history" class="history-tags"></div>
        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const API_KEY = "c019492c73444c75a6c7264e0fdf3562";
let map, chart;

// ── MAP ──────────────────────────────────────────────────────
function initMap(lat = 20, lon = 0) {
    if (map) map.remove();
    map = L.map('map', { zoomControl: true }).setView([lat, lon], lat === 20 ? 2 : 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
    if (lat !== 20) L.marker([lat, lon]).addTo(map);
}
initMap();

// ── VALIDATION ───────────────────────────────────────────────
function isValidIP(ip) {
    return /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$/.test(ip);
}

// ── DEVICE ───────────────────────────────────────────────────
function getDeviceInfo() {
    const ua = navigator.userAgent;
    return {
        "Device":  /mobile/i.test(ua) ? "Mobile" : /tablet|ipad/i.test(ua) ? "Tablet" : "Desktop",
        "OS":      /windows/i.test(ua) ? "Windows" : /android/i.test(ua) ? "Android" :
                   /iphone|ipad|ipod/i.test(ua) ? "iOS" : /mac/i.test(ua) ? "macOS" :
                   /linux/i.test(ua) ? "Linux" : "Unknown",
        "Browser": /edg/i.test(ua) ? "Edge" : /chrome|crios/i.test(ua) ? "Chrome" :
                   /firefox/i.test(ua) ? "Firefox" : /safari/i.test(ua) ? "Safari" : "Unknown",
        "Screen":  `${screen.width}×${screen.height}`
    };
}

function renderDevice() {
    const info = getDeviceInfo();
    const container = document.getElementById("deviceInfo");
    container.innerHTML = Object.entries(info).map(([k, v]) => `
        <div class="info-item">
            <div class="info-key">${k}</div>
            <div class="info-val">${v}</div>
        </div>
    `).join('');
}

// ── RISK ENGINE ──────────────────────────────────────────────
/*
  Scores are additive and capped at 100.
  Each factor has a weight. We return the raw breakdown so the
  chart can show per-category values with real numbers.
*/
function calcRisk(data) {
    const isp  = (data.isp  || "").toLowerCase();
    const org  = (data.organization || "").toLowerCase();
    const conn = (data.connection_type || "").toLowerCase();

    const factors = {
        vpn:     0,
        proxy:   0,
        hosting: 0,
        tor:     0,
        mobile:  0,
    };

    // VPN keywords
    const vpnKw = ["vpn","nordvpn","expressvpn","surfshark","cyberghost","proton","mullvad","hideMyAss","windscribe","private internet access","pia ","tunnelbear"];
    if (vpnKw.some(k => isp.includes(k) || org.includes(k))) factors.vpn = 45;

    // Proxy / anonymizer
    const proxyKw = ["proxy","anonymizer","tor","socks","relay","anonymous"];
    if (proxyKw.some(k => isp.includes(k) || org.includes(k))) factors.proxy = 35;

    // Tor exit node (ISP literally says tor)
    if (isp.includes("tor ") || isp.includes("tor-")) factors.tor = 50;

    // Hosting / datacenter → not a real user, likely bot/scanner
    const hostKw = ["amazon","aws","google cloud","microsoft azure","digitalocean","linode","vultr","hetzner","ovh","rackspace","hosting","datacenter","data center","colocation","cloudflare"];
    if (hostKw.some(k => isp.includes(k) || org.includes(k))) factors.hosting = 30;

    // Mobile carrier → low risk indicator (reduce)
    if (conn === "mobile" || conn === "cellular") factors.mobile = -10;

    // Compute total (cap 0–100)
    const total = Math.min(100, Math.max(0,
        factors.vpn + factors.proxy + factors.tor + factors.hosting + factors.mobile
    ));

    return { total, factors };
}

// ── MY IP ────────────────────────────────────────────────────
async function getMyIP() {
    try {
        const res  = await fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${API_KEY}`);
        const data = await res.json();
        document.getElementById("ipInput").value = data.ip;
        checkIP();
    } catch (e) {
        alert("Could not detect your IP.");
    }
}

// ── CHECK IP ─────────────────────────────────────────────────
async function checkIP() {
    const ip     = document.getElementById("ipInput").value.trim();
    const result = document.getElementById("result");
    const loader = document.getElementById("loader");

    if (!ip) { result.innerHTML = '<div class="alert">Enter an IP address.</div>'; return; }
    if (!isValidIP(ip)) { result.innerHTML = '<div class="alert">Invalid IP format — e.g. 8.8.8.8</div>'; return; }

    loader.classList.remove("hidden");
    result.innerHTML = "";

    try {
        const res  = await fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${API_KEY}&ip=${ip}`);
        const data = await res.json();
        loader.classList.add("hidden");

        if (data.message) {
            result.innerHTML = `<div class="alert">API: ${data.message}</div>`;
            return;
        }

        // ── Risk calculation ──────────────────────────────────
        const { total, factors } = calcRisk(data);

        const level = total >= 60 ? "high" : total >= 25 ? "medium" : "low";
        const color = level === "high" ? "var(--high)" :
                      level === "medium" ? "var(--medium)" : "var(--low)";

        // ── Result HTML ───────────────────────────────────────
        const flagUrl = data.country_code2
            ? `https://flagsapi.com/${data.country_code2}/flat/24.png`
            : "";

        result.innerHTML = `
            <div class="ip-label">${data.ip}</div>
            <div class="location-line">
                ${flagUrl ? `<img src="${flagUrl}" style="vertical-align:middle">` : ""}
                ${data.city || "—"}, ${data.state_prov || "—"}, ${data.country_name || "—"}
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-key">ISP</div>
                    <div class="info-val">${data.isp || "—"}</div>
                </div>
                <div class="info-item">
                    <div class="info-key">Organization</div>
                    <div class="info-val">${data.organization || "—"}</div>
                </div>
                <div class="info-item">
                    <div class="info-key">Connection</div>
                    <div class="info-val">${data.connection_type || "—"}</div>
                </div>
                <div class="info-item">
                    <div class="info-key">Timezone</div>
                    <div class="info-val">${data.time_zone?.name || "—"}</div>
                </div>
            </div>

            <div class="risk-section">
                <div class="risk-header">
                    <div>
                        <span class="risk-score-num" style="color:${color}">${total}</span>
                        <span class="risk-label" style="color:${color}">/ 100 &mdash; ${level.toUpperCase()}</span>
                    </div>
                </div>
                <div class="risk-bar-bg">
                    <div class="risk-bar-fill" style="width:${total}%; background:${color}"></div>
                </div>
                <div class="risk-factors">
                    ${Object.entries(factors).map(([k, v]) =>
                        `<span class="factor-tag ${v > 0 ? 'active' : 'inactive'}">${k.toUpperCase()} ${v > 0 ? '+'+v : '✓'}</span>`
                    ).join('')}
                </div>
            </div>
        `;

        // ── Map ───────────────────────────────────────────────
        const lat = parseFloat(data.latitude);
        const lon = parseFloat(data.longitude);
        if (!isNaN(lat) && !isNaN(lon)) initMap(lat, lon);

        // ── Chart ─────────────────────────────────────────────
        updateChart(factors);

        // ── Device + history ──────────────────────────────────
        renderDevice();
        saveHistory(ip);

    } catch (e) {
        loader.classList.add("hidden");
        result.innerHTML = `<div class="alert">Request failed. Check network or API key.</div>`;
    }
}

// ── CHART ────────────────────────────────────────────────────
function updateChart(factors) {
    const canvas = document.getElementById("riskChart");
    if (chart) chart.destroy();

    const labels = Object.keys(factors).map(k => k.toUpperCase());
    const values = Object.values(factors).map(v => Math.max(0, v)); // clamp negatives to 0 for display
    const colors = values.map(v =>
        v >= 40 ? "#ff3c3c" :
        v >= 20 ? "#ffaa00" :
        "#39ff14"
    );

    chart = new Chart(canvas, {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: "Risk Weight",
                data: values,
                backgroundColor: colors,
                borderRadius: 4,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ` Score: ${ctx.parsed.y}`
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: "#4a6075", font: { family: "Share Tech Mono", size: 11 } },
                    grid: { color: "#1a2a3a" }
                },
                y: {
                    beginAtZero: true,
                    max: 60,
                    ticks: { color: "#4a6075", font: { family: "Share Tech Mono", size: 11 } },
                    grid: { color: "#1a2a3a" }
                }
            }
        }
    });
}

// ── HISTORY ──────────────────────────────────────────────────
function saveHistory(ip) {
    let h = JSON.parse(localStorage.getItem("ipe_history") || "[]");
    h = h.filter(i => i !== ip);
    h.unshift(ip);
    if (h.length > 6) h.pop();
    localStorage.setItem("ipe_history", JSON.stringify(h));
    renderHistory();
}

function renderHistory() {
    const el = document.getElementById("history");
    const h  = JSON.parse(localStorage.getItem("ipe_history") || "[]");
    if (!h.length) {
        el.innerHTML = '<div class="empty-state">No history yet.</div>';
        return;
    }
    el.innerHTML = h.map(ip =>
        `<span class="history-chip" onclick="document.getElementById('ipInput').value='${ip}';checkIP()">${ip}</span>`
    ).join('');
}

// ── INIT ─────────────────────────────────────────────────────
window.onload = () => {
    renderDevice();
    renderHistory();
    getMyIP();
};
</script>
</body>
</html>
